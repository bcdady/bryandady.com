name: 'CodeQL Security Scanning'

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '30 1 * * 1' # Weekly on Mondays at 1:30 AM UTC

jobs:
  node:
    name: Check lockfile consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4

      # Verify lockfile is up-to-date
      - name: Check aube.lock consistency
        run: |
          echo "Running frozen install to verify aube.lock..."
          aube install --frozen-lockfile

      # Run security audit
      - name: Aube security audit
        run: aube audit

      # Run typecheck to catch type errors early
      - name: Type check
        run: aube run typecheck

  analyze:
    name: Analyze Code
    needs: node
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: true
      matrix:
        include:
          - language: javascript-typescript
            build-mode: autobuild

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          queries: +security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{matrix.language}}'
